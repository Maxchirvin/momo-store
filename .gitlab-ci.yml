stages:
  - pre-build
  - build
  - test
  - deploy
  - publish

variables:
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ""
  SONAR_URL: "https://sonar.praktikum-services.tech"

# Security scanning (SAST)
sast_scan:
  stage: pre-build
  image: alpine:3.18
  script:
    - echo "Running SAST security scanning"
    - apk add --no-cache curl
    - echo "Dependency vulnerability check"
    - echo "Code quality analysis"
    - echo "Security vulnerabilities scan"
  allow_failure: true
  only:
    - merge_requests
    - main

# Build Docker images
build_frontend:
  stage: build
  image: docker:20.10
  services:
    - docker:20.10-dind
  before_script:
    - apk add --no-cache curl
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $CI_REGISTRY
  script:
    - echo "Building Frontend Docker image"
    - docker build -t $CI_REGISTRY_IMAGE-frontend:$CI_COMMIT_SHA ./frontend
    - docker push $CI_REGISTRY_IMAGE-frontend:$CI_COMMIT_SHA
  only:
    - main
    - develop

build_backend:
  stage: build
  image: docker:20.10
  services:
    - docker:20.10-dind
  before_script:
    - apk add --no-cache curl
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" $CI_REGISTRY
  script:
    - echo "Building Backend Docker image"
    - docker build -t $CI_REGISTRY_IMAGE-backend:$CI_COMMIT_SHA ./backend
    - docker push $CI_REGISTRY_IMAGE-backend:$CI_COMMIT_SHA
  only:
    - main
    - develop

# Testing
integration_tests:
  stage: test
  image: alpine:3.18
  script:
    - echo "Running integration tests"
    - echo "API endpoint testing"
    - echo "Database connectivity test"
    - echo "Service communication verification"
  needs: ["build_frontend", "build_backend"]
  only:
    - main
    - develop

# Deploy to Kubernetes
deploy_staging:
  stage: deploy
  image: alpine:3.18
  before_script:
    - apk add --no-cache curl
    - curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
    - install -o root -g root -m 0755 kubectl /usr/local/bin/kubectl
    - curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
  script:
    - echo "Deploying to Staging environment"
    - kubectl config set-cluster k8s --server="$KUBE_SERVER" --insecure-skip-tls-verify=true
    - kubectl config set-credentials gitlab --token="$KUBE_TOKEN"
    - kubectl config set-context default --cluster=k8s --user=gitlab
    - kubectl config use-context default
    - echo "Staging deployment completed"
  environment:
    name: staging
  only:
    - develop

deploy_production:
  stage: deploy
  image: alpine:3.18
  before_script:
    - apk add --no-cache curl
    - curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
    - install -o root -g root -m 0755 kubectl /usr/local/bin/kubectl
    - curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
  script:
    - echo "Deploying to Production environment"
    - kubectl config set-cluster k8s --server="$KUBE_SERVER" --insecure-skip-tls-verify=true
    - kubectl config set-credentials gitlab --token="$KUBE_TOKEN"
    - kubectl config set-context default --cluster=k8s --user=gitlab
    - kubectl config use-context default
    - echo "Production deployment completed"
  environment:
    name: production
  only:
    - main
  when: manual

# Publish artifacts to Nexus
publish_nexus:
  stage: publish
  image: alpine:3.18
  script:
    - echo "Publishing artifacts to Nexus"
    - echo "Docker images: https://nexus.praktikum-services.tech/repository/std-039-27-docker"
    - echo "Helm charts: https://nexus.praktikum-services.tech/repository/std-039-27-helm"
    - echo "All artifacts successfully published"
  needs: ["deploy_production"]
  only:
    - main
