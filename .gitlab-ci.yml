stages:
  - test
  - build
  - deploy

variables:
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ""

.test_template: &test_template
  image: alpine:3.18
  before_script:
    - apk add --no-cache curl

unit_tests:
  <<: *test_template
  stage: test
  script:
    - echo "Running unit tests..."
    - curl --version
  only:
    - merge_requests
    - develop

build_docker:
  stage: build
  image: docker:20.10
  services:
    - docker:20.10-dind
  script:
    - echo "Building Docker image..."
    - docker --version
  only:
    - master
    - develop

deploy_staging:
  <<: *test_template
  stage: deploy
  script:
    - echo "Deploying to staging..."
    - kubectl version --client 2>/dev/null || echo "kubectl not installed"
  environment:
    name: staging
  only:
    - develop
