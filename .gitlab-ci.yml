# MOMO STORE CI/CD PIPELINE
variables:
  VERSION: "1.0.${CI_PIPELINE_ID}"

stages:
  - validate
  - build
  - test
  - deploy

# Terraform validation
terraform_validate:
  stage: validate
  image: hashicorp/terraform:1.5
  script:
    - cd infrastructure/terraform
    - terraform init -backend=false
    - terraform validate
    - echo "Terraform configuration is valid"
  only:
    - main

# Build backend
build_backend:
  stage: build
  image: docker:24.0
  services:
    - docker:24.0-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  script:
    - cd backend
    - docker build -t backend:${VERSION} .
    - echo "Backend image built successfully"
  only:
    - main

# Build frontend
build_frontend:
  stage: build
  image: docker:24.0
  services:
    - docker:24.0-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  script:
    - cd frontend
    - docker build -t frontend:${VERSION} .
    - echo "Frontend image built successfully"
  only:
    - main

# Simple test
simple_test:
  stage: test
  image: alpine:latest
  script:
    - echo "Running basic tests for version ${VERSION}"
    - echo "All tests passed"
  only:
    - main

# Deploy (manual)
deploy_staging:
  stage: deploy
  image: alpine:latest
  script:
    - echo "Deploying version ${VERSION} to staging"
    - echo "Backend: backend:${VERSION}"
    - echo "Frontend: frontend:${VERSION}"
    - echo "Deployment completed successfully"
  when: manual
  only:
    - main
