stages:
  - validate
  - plan

variables:
  TF_DIR: infrastructure/terraform

before_script:
  - cd ${TF_DIR}
  - terraform --version

validate:
  stage: validate
  script:
    - terraform init -backend=false
    - terraform validate
  only:
    - main

plan:
  stage: plan
  script:
    - terraform init -backend=false
    - terraform plan -var-file="secret.tfvars"
  dependencies:
    - validate
  only:
    - main
