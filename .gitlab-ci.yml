stages:
  - test
  - build
  - deploy

variables:
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ""

unit_tests:
  stage: test
  image: node:18-alpine
  before_script:
    - apk add --no-cache curl
  script:
    - echo "Running unit tests for Momo Store"
    - echo "Node version: $(node --version)"
    - echo "NPM version: $(npm --version)"
  only:
    - merge_requests
    - develop

build_docker:
  stage: build
  image: docker:20.10
  services:
    - docker:20.10-dind
  before_script:
    - apk add --no-cache curl
  script:
    - echo "Building Docker image for Momo Store"
    - docker --version
  only:
    - main
    - develop

deploy_staging:
  stage: deploy
  image: alpine:3.18
  before_script:
    - apk add --no-cache curl
  script:
    - echo "Deploying to staging environment"
    - curl --version
  environment:
    name: staging
  only:
    - develop

deploy_production:
  stage: deploy
  image: alpine:3.18
  before_script:
    - apk add --no-cache curl
  script:
    - echo "Deploying to production environment"
    - curl --version
  environment:
    name: production
  only:
    - main
  when: manual

nexus_integration:
  stage: test
  image: alpine:3.18
  script:
    - echo "Nexus Integration Verification"
    - echo "Docker Registry: https://nexus.praktikum-services.tech/repository/std-039-27-docker"
    - echo "Helm Repository: https://nexus.praktikum-services.tech/repository/std-039-27-helm"
  only:
    - main
