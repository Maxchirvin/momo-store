# =============================================
# MOMO STORE CI/CD PIPELINE
# =============================================

variables:
  VERSION: "1.0.${CI_PIPELINE_ID}"
  DOCKER_REGISTRY: "${CI_REGISTRY}/std-039-27/momo-store"

stages:
  - pre-build
  - build
  - test
  - security-scan
  - publish
  - deploy

# === PRE-BUILD: Terraform Validation ===
terraform_validate:
  stage: pre-build
  image: 
    name: hashicorp/terraform:1.5
    entrypoint: [""]
  script:
    - cd infrastructure/terraform
    - terraform init -backend=false
    - terraform validate
    - terraform fmt -check
  artifacts:
    paths:
      - infrastructure/terraform/
  only:
    - main

# === PRE-BUILD: SAST Scanning ===
sast_scan:
  stage: pre-build
  image: 
    name: returntocorp/semgrep:latest
    entrypoint: [""]
  script:
    - semgrep --config=auto --json -o sast-report.json .
  artifacts:
    when: always
    paths:
      - sast-report.json
  allow_failure: true
  only:
    - main

# === PRE-BUILD: Secret Detection ===
secret_detection:
  stage: pre-build
  image:
    name: zricethezav/gitleaks:latest
    entrypoint: [""]
  script:
    - gitleaks detect --source . --report-format json --report-path gitleaks-report.json
  artifacts:
    when: always
    paths:
      - gitleaks-report.json
  allow_failure: true
  only:
    - main

# === BUILD: Backend Docker Image ===
build_backend:
  stage: build
  image: docker:24.0
  services:
    - docker:24.0-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  script:
    - cd backend
    - docker build -t ${DOCKER_REGISTRY}/backend:${VERSION} .
    - docker login -u ${CI_REGISTRY_USER} -p ${CI_REGISTRY_PASSWORD} ${CI_REGISTRY}
    - docker push ${DOCKER_REGISTRY}/backend:${VERSION}
  artifacts:
    paths:
      - backend/
  only:
    - main

# === BUILD: Frontend Docker Image ===
build_frontend:
  stage: build
  image: docker:24.0
  services:
    - docker:24.0-dind
  variables:
    DOCKER_HOST: tcp://docker:2375
    DOCKER_TLS_CERTDIR: ""
  script:
    - cd frontend
    - docker build -t ${DOCKER_REGISTRY}/frontend:${VERSION} .
    - docker login -u ${CI_REGISTRY_USER} -p ${CI_REGISTRY_PASSWORD} ${CI_REGISTRY}
    - docker push ${DOCKER_REGISTRY}/frontend:${VERSION}
  artifacts:
    paths:
      - frontend/
  only:
    - main

# === TEST: Backend Tests ===
backend_tests:
  stage: test
  image: golang:1.19-alpine
  script:
    - cd backend
    - go test -v ./...
  dependencies:
    - build_backend
  only:
    - main

# === TEST: Frontend Tests ===
frontend_tests:
  stage: test
  image: node:16-alpine
  script:
    - cd frontend
    - npm install
    - npm run test:unit
  dependencies:
    - build_frontend
  only:
    - main

# === SECURITY SCAN: Container Scanning ===
container_scan:
  stage: security-scan
  image: 
    name: aquasec/trivy:latest
    entrypoint: [""]
  script:
    - trivy image --exit-code 0 --format table ${DOCKER_REGISTRY}/backend:${VERSION}
    - trivy image --exit-code 0 --format table ${DOCKER_REGISTRY}/frontend:${VERSION}
  dependencies:
    - build_backend
    - build_frontend
  allow_failure: true
  only:
    - main

# === PUBLISH: Push to Nexus ===
publish_nexus:
  stage: publish
  image: curlimages/curl:latest
  script:
    - |
      echo "Publishing version ${VERSION} to Nexus"
      # Здесь будет логика публикации в Nexus
      echo "Backend: ${DOCKER_REGISTRY}/backend:${VERSION}"
      echo "Frontend: ${DOCKER_REGISTRY}/frontend:${VERSION}"
  dependencies:
    - build_backend
    - build_frontend
  only:
    - main

# === DEPLOY: Kubernetes Deployment ===
deploy_staging:
  stage: deploy
  image: alpine/k8s:1.26
  script:
    - |
      # Декодируем kubeconfig
      echo "${KUBE_CONFIG}" | base64 -d > kubeconfig
      export KUBECONFIG=kubeconfig
      
      # Проверяем подключение
      kubectl cluster-info
      kubectl get nodes
      
      # Деплой (упрощенный)
      echo "Would deploy version ${VERSION} to Kubernetes"
      echo "Backend image: ${DOCKER_REGISTRY}/backend:${VERSION}"
      echo "Frontend image: ${DOCKER_REGISTRY}/frontend:${VERSION}"
  when: manual
  dependencies:
    - publish_nexus
  only:
    - main
