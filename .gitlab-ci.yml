stages:
  - test
  - build
  - deploy

variables:
  DOCKER_HOST: tcp://docker:2375
  DOCKER_TLS_CERTDIR: ""
  # Корпоративный Nexus Docker Registry
  NEXUS_DOCKER_REGISTRY: "https://nexus.praktikum-services.tech/repository/std-039-27-docker"
  NEXUS_DOCKER_IMAGE: "nexus.praktikum-services.tech/repository/std-039-27-docker/momo-store"

.test_template: &test_template
  image: alpine:3.18
  before_script:
    - apk add --no-cache curl

unit_tests:
  <<: *test_template
  stage: test
  script:
    - echo "Running unit tests..."
    - echo "Nexus Docker Registry: $NEXUS_DOCKER_REGISTRY"
  only:
    - merge_requests
    - develop

# Сборка и публикация в КОРПОРАТИВНЫЙ Nexus Docker Registry
build_docker_nexus:
  stage: build
  image: docker:20.10
  services:
    - docker:20.10-dind
  before_script:
    - apk add --no-cache curl
    - docker login -u "$NEXUS_USERNAME" -p "$NEXUS_PASSWORD" $NEXUS_DOCKER_REGISTRY
  script:
    - echo "Building and publishing to CORPORATE Nexus Docker Registry..."
    - docker build -t $NEXUS_DOCKER_IMAGE:$CI_COMMIT_SHA .
    - docker push $NEXUS_DOCKER_IMAGE:$CI_COMMIT_SHA
    - docker tag $NEXUS_DOCKER_IMAGE:$CI_COMMIT_SHA $NEXUS_DOCKER_IMAGE:latest
    - docker push $NEXUS_DOCKER_IMAGE:latest
    - echo "Docker image published to CORPORATE Nexus Registry"
  only:
    - master
    - develop

deploy_with_nexus_images:
  stage: deploy
  image: alpine:3.18
  before_script:
    - apk add --no-cache curl
    - curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
    - install -o root -g root -m 0755 kubectl /usr/local/bin/kubectl
    - curl https://raw.githubusercontent.com/helm/helm/main/scripts/get-helm-3 | bash
    - helm repo add momo-store-nexus $NEXUS_URL/repository/std-039-27-helm/ --username $NEXUS_USERNAME --password $NEXUS_PASSWORD
    - helm repo update
  script:
    - echo "Deploying using Nexus artifacts..."
    - kubectl config set-cluster k8s --server="$KUBE_SERVER" --insecure-skip-tls-verify=true
    - kubectl config set-credentials gitlab --token="$KUBE_TOKEN"
    - kubectl config set-context default --cluster=k8s --user=gitlab
    - kubectl config use-context default
    - echo "Deployment using Nexus completed"
  environment:
    name: production
  only:
    - master
  when: manual
