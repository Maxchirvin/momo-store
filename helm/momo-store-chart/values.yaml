# Default values for momo-store
app:
  name: momo-store
  replicaCount: 2
  image:
    repository: cr.yandex/your-registry/momo-store
    tag: "latest"
    pullPolicy: IfNotPresent
  service:
    type: ClusterIP
    port: 80
    targetPort: 3000
  ingress:
    enabled: true
    className: nginx
    hosts:
      - host: momo-store.example.com
        paths:
          - path: /
            pathType: Prefix
    tls: []

# Database configuration
database:
  enabled: true
  type: postgresql
  host: postgresql
  port: 5432
  name: momostore
  username: momouser

# Redis configuration
redis:
  enabled: true
  host: redis
  port: 6379

# Resources
resources:
  requests:
    memory: "512Mi"
    cpu: "250m"
  limits:
    memory: "1Gi"
    cpu: "500m"

# Autoscaling
autoscaling:
  enabled: false
  minReplicas: 1
  maxReplicas: 3
  targetCPUUtilizationPercentage: 80

# Environment variables
env:
  NODE_ENV: production
  PORT: "3000"
