apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: momo-store-ingress
spec:
  ingressClassName: nginx
  rules:
  - http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: momo-frontend-service
            port:
              number: 80
      - path: /api
        pathType: Prefix
        backend:
          service:
            name: momo-backend-service
            port:
              number: 8081
