apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-momo-store-dashboard
  namespace: monitoring
  labels:
    grafana_dashboard: "1"
data:
  momo-store.json: |-
    {
      "title": "Momo Store Application",
      "tags": ["momo-store", "application"],
      "timezone": "browser",
      "panels": [
        {
          "title": "HTTP Requests",
          "type": "stat",
          "targets": [{
            "expr": "sum(rate(http_requests_total{app='momo-store'}[5m]))",
            "legendFormat": "Requests/sec"
          }]
        }
      ]
    }
